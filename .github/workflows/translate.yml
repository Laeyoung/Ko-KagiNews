name: Translate daily batch

on:
  schedule:
    # Batch publishes 12:00 UTC sharp (observed createdAt 12:00:07–11), but
    # GitHub delivers scheduled runs 60–90+ min late in practice. The fast path
    # is therefore wait-mode ticks scheduled BEFORE publish: each starts a
    # runner that polls /batches/latest and translates the moment the new batch
    # appears (translate-batch.ts --wait-minutes, spec §4.3 wait mode). Several
    # staggered ticks guard against dropped deliveries; the concurrency group
    # collapses overlaps (later ticks no-op idempotently). 14:00/16:00 remain
    # plain idempotent catch-ups. Off-hour minutes dodge peak-load delay.
    # NOTE: schedule only fires on the default branch (after merge to main).
    - cron: '3 10 * * *'   # wait tick
    - cron: '33 10 * * *'  # wait tick
    - cron: '3 11 * * *'   # wait tick
    - cron: '33 11 * * *'  # wait tick
    - cron: '3 12 * * *'   # wait tick (also nets a late upstream publish)
    - cron: '0 14 * * *'   # catch-up
    - cron: '0 16 * * *'   # catch-up
  workflow_dispatch:
    inputs:
      wait_minutes:
        description: 'Poll up to N minutes for a new batch before translating (0 = translate current latest; clamped to 140 so the job timeout cannot kill the wait)'
        required: false
        default: '0'

concurrency:
  group: translate
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    # Wait ticks idle up to WAIT_MINUTES before the ~15-min translate+commit;
    # catch-ups keep the old tight 30-min hang cap.
    timeout-minutes: ${{ (github.event.schedule == '0 14 * * *' || github.event.schedule == '0 16 * * *') && 30 || 170 }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve wait mode
        id: wait
        env:
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_WAIT: ${{ inputs.wait_minutes }}
        # Wait ticks poll long enough that even the earliest tick (10:03,
        # delivered on time) is still polling at ~12:23, past the 12:00 publish.
        run: |
          case "$SCHEDULE" in
            "3 10 * * *"|"33 10 * * *"|"3 11 * * *"|"33 11 * * *"|"3 12 * * *")
              echo "minutes=140" >> "$GITHUB_OUTPUT" ;;
            "")
              # Manual dispatch: sanitize to digits and clamp to 140 so the
              # wait deadline always fires before the 170-min job timeout.
              M="${INPUT_WAIT:-0}"
              case "$M" in *[!0-9]*|"") M=0 ;; esac
              if [ "$M" -gt 140 ]; then M=140; fi
              echo "minutes=$M" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "minutes=0" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Translate latest batch
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRANSLATIONS_DIR: ./data/translations
        run: bun scripts/translate-batch.ts --wait-minutes "${{ steps.wait.outputs.minutes }}"

      - name: Prune batches older than the newest 7
        run: bun scripts/prune-translations.ts

      - name: Commit and push sidecars
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/translations
          if git diff --cached --quiet; then
            echo "No sidecar changes to commit"
          elif git diff --cached --name-only | grep -qv '/index\.json$'; then
            git commit -m "chore(translations): daily sidecars $(date -u +%F)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          else
            # An idempotent skip run only touches index.json bookkeeping
            # (updatedAt/status) — committing it would redeploy for nothing.
            echo "Only index.json bookkeeping changed — skipping commit"
            git reset -q
          fi
